<!DOCTYPE html>
<html lang="en">
<head>
  <!--Google Fonts-->
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=Lexend:wght@100..900&family=Parisienne&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto+Mono:ital,wght@0,100..700;1,100..700&family=Stack+Sans+Text:wght@200..700&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
<!--  Google Fonts-->
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="description" content="Neo Chat is a chatting platform where you can socialize Anywhere, Anytime with any device">
  <meta name="robots" content="index, follow">
  <link rel="icon" href="favicon.ico">
  <meta charset="UTF-8">
  <title>NeoChat</title>

  <!-- External CSS -->
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js/styles/github-dark.css">
</head>
<body>
  <div class="chat-container">
    <div class="chat-header">
      #general
    </div>

    <div class="chat-box">
      <div class="system message">
        Server: Welcome To <b>NeoChat!</b>
      </div>
      <div class="system message">
        Tip: <i>Markdown</i> is supported
      </div>
    </div>

    <div class="chat-input">
      <textarea placeholder="Type a message..."></textarea>
      <button>
        <img src="public/send.png" alt="send icon" title="Send">
      </button>
    </div>
  </div>
  <div class="popup">
    <div class="popup-content">
      <h1>Title</h1>
      <p>Description</p>

      <div class="popup-actions">
        <button id="cancel">Cancel</button>
        <a target="_blank">Continue</a>
      </div>
    </div>
  </div>
  <!-- Socket.io -->
  <script src="/socket.io/socket.io.js"></script>

  <!-- External JS -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/languages/go.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
