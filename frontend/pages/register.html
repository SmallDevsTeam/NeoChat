<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=Lexend:wght@100..900&family=Parisienne&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto+Mono:ital,wght@0,100..700;1,100..700&family=Stack+Sans+Text:wght@200..700&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <!--  Google Fonts-->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="description" content="NeoChat Registration page for a new account.">
  <meta name="robots" content="index, follow">
  <link rel="icon" href="favicon.ico">
  <link rel="stylesheet" href="./css/auth.css">
  <title>NeoChat | Register</title>
</head>
<body>
  <div class="register">
    <h1>Register</h1>
    <h3>Register your Neochat Account</h3>
    <form>
      <div class="username">
        <label>Username:</label>
        <input placeholder="John Doe" type="text" min="3" max="15"></input>
      </div>
      <div class="password">
        <label>Password:</label>
        <input class="password" type="password" placeholder="********" min="6" max="30"></input>
      </div>
      <button class="confirm" type="submit">Submit</button>
    </form>
  </div>
</body>
</html>
