<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>404 - Page Not Found</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      height: 100vh;
      background: #0a0a0a;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #e5e5e5;
      text-align: center;
    }

    .container {
      max-width: 500px;
    }

    h1 {
      font-size: 110px;
      font-weight: bold;
      color: #ffffff;
    }

    img {
      max-width: 256px;
      max-height: 256px;
    }

    h2 {
      font-size: 26px;
      margin-bottom: 10px;
      color: #d4d4d4;
    }

    p {
      color: #9ca3af;
      margin-bottom: 25px;
    }

    a {
      text-decoration: none;
      padding: 12px 25px;
      background: #1f1f1f;
      color: #ffffff;
      border: 1px solid #3f3f46;
      border-radius: 6px;
      transition: 0.2s ease;
    }

    a:hover {
      background: #2a2a2a;
      border-color: #6b7280;
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="../../public/404_logo.png" alt="404">
    <h2>Page Not Found</h2>
    <p>The page you’re looking for doesn’t exist or was moved.</p>
    <a href="/">Go Home</a>
  </div>
</body>
</html>
